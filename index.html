<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc you letter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calcBody">
        <div class = "display"></div>
        <div class="buttArea">
            <div class="butt clear">A/C</div>
            <div class="butt sign">+/-</div>
            <div class="butt per">%</div>
            <div class="butt divide">/</div>
            <div class="butt seven">7</div>
            <div class="butt eight">8</div>
            <div class="butt nine">9</div>
            <div class="butt multi">x</div>
            <div class="butt four">4</div>
            <div class="butt five">5</div>
            <div class="butt six">6</div>
            <div class="butt minus">-</div>
            <div class="butt one">1</div>
            <div class="butt two">2</div>
            <div class="butt three">3</div>
            <div class="butt plus">+</div>
            <div class="butt0">0</div>
            <div class="butt deci">.</div>
            <div class="butt equal">=</div>
        </div>
    </div>
</body>
</html>
